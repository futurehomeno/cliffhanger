name: Go

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  linter:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          github-token: ${{ secrets.GH_OAUTH_TOKEN }}

      - name: Install mockery and generate mocks
        uses: ./.github/actions/mockery

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: .
          args: --skip-dirs=test --skip-dirs=testdata

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck $(go list ./... | grep -v /test)

  test:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go environment
        uses: ./.github/actions/setup-go-env
        with:
          github-token: ${{ secrets.GH_OAUTH_TOKEN }}

      - name: Start Mosquitto
        uses: ./.github/actions/mosquitto

      - name: Install mockery and generate mocks
        uses: ./.github/actions/mockery

      - name: Test
        shell: bash
        run: |
          make test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - test
      - linter
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Determine previous tag
      id: prevtag
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" --exclude "${GITHUB_REF_NAME}")
        echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        LAST=${{ steps.prevtag.outputs.last_tag }}
        echo "### Changes since \"$LAST\"" > changes.md
        echo "" >> changes.md

        # Parse commit messages for "(#123)" pattern - works for squash/merge/rebase
        PRS=$(git log "$LAST"..HEAD --pretty=format:"%s" | grep -E "\(#[0-9]+\)" || true)

        if [[ -z "$PRS" ]]; then
          echo "_No PRs found in this release range._" >> changes.md
          exit 0
        fi

        echo "$PRS" >> changes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body_path: changes.md
        files: artifacts/kind-owl-armhf/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
